<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 PGA Championship Pool</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-title">PGA Championship</div>
    <div class="header-subtitle">Aronimink Golf Club -- Newtown Square, Pennsylvania</div>
    <div class="header-meta">May 14--17, 2026 &nbsp;|&nbsp; Pool Leaderboard</div>
  </div>

  <!-- Par row -->
  <div class="par-row">
    <div class="par-cell hole-label"><div>HOLE</div><div>PAR</div></div>
    <div class="par-cell"><div>1</div><div>4</div></div>
    <div class="par-cell"><div>2</div><div>4</div></div>
    <div class="par-cell"><div>3</div><div>3</div></div>
    <div class="par-cell"><div>4</div><div>4</div></div>
    <div class="par-cell"><div>5</div><div>4</div></div>
    <div class="par-cell"><div>6</div><div>3</div></div>
    <div class="par-cell"><div>7</div><div>4</div></div>
    <div class="par-cell"><div>8</div><div>5</div></div>
    <div class="par-cell"><div>9</div><div>4</div></div>
    <div class="par-cell"><div>10</div><div>4</div></div>
    <div class="par-cell"><div>11</div><div>3</div></div>
    <div class="par-cell"><div>12</div><div>4</div></div>
    <div class="par-cell"><div>13</div><div>5</div></div>
    <div class="par-cell"><div>14</div><div>4</div></div>
    <div class="par-cell"><div>15</div><div>3</div></div>
    <div class="par-cell"><div>16</div><div>4</div></div>
    <div class="par-cell"><div>17</div><div>4</div></div>
    <div class="par-cell"><div>18</div><div>4</div></div>
    <div class="par-cell hole-label"><div>TOTAL</div><div>70</div></div>
  </div>

  <!-- Leaderboard -->
  <div class="leaderboard-wrap">
    <div class="leaderboard-title">Leaderboard</div>
    <div id="leaderboard-container">
      <div class="state-msg" id="status-msg">Loading scores...</div>
    </div>
    <div class="status-bar" id="status-bar"></div>
  </div>

  <script>
  // -- Utilities --------------------------------------------------------------

  function normalizeName(name) {
    for (const [form, api] of Object.entries(CONFIG.nameMap)) {
      if (name === form) return api;
    }
    return name;
  }

  function formatScore(val) {
    if (val === null || val === undefined) return { display: "--", cls: "dash" };
    if (val === 0)  return { display: "E",  cls: "even" };
    if (val < 0)   return { display: String(val), cls: "under" };
    return { display: "+" + val, cls: "over" };
  }

  function parseCSV(text) {
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
    return lines.slice(1).map(line => {
      const cols = [];
      let cur = "", inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; continue; }
        if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; continue; }
        cur += ch;
      }
      cols.push(cur.trim());
      const row = {};
      headers.forEach((h, i) => row[h] = cols[i] ?? "");
      return row;
    });
  }

  // -- ESPN fetch -------------------------------------------------------------

  let cachedGolfers = null;

  async function fetchESPN() {
    try {
      const url = `${CONFIG.espnEndpoint}?event=${CONFIG.espnEventId}`;
      const res = await fetch(url);
      const data = await res.json();

      const competitors = data?.events?.[0]?.competitions?.[0]?.competitors ?? [];
      if (!competitors.length) return cachedGolfers;

      // STEP 1: Build raw scores for all players
      const rawMap = {};
      competitors.forEach(c => {
        const name = c.athlete?.displayName ?? "";
        const statusDesc = c.status?.type?.description?.toLowerCase() ?? "";
        const madeCut = !statusDesc.includes("cut");
        const withdrawn = statusDesc.includes("withdrawn");

        const completedRounds = (c.linescores ?? []).filter(r =>
          r.displayValue && r.displayValue !== "-" && r.displayValue !== "--"
        );

        let totalToPar = null;
        if (completedRounds.length > 0) {
          totalToPar = completedRounds.reduce((sum, r) => {
            const val = r.displayValue === "E" ? 0 : parseInt(r.displayValue);
            return sum + (isNaN(val) ? 0 : val);
          }, 0);
        }

        rawMap[name] = { name, totalToPar, madeCut, withdrawn };
      });

      // STEP 2: Find worst score among players who MADE the cut and have a score
      let worstScore = -999;
      Object.values(rawMap).forEach(g => {
        if (g.madeCut && !g.withdrawn && g.totalToPar !== null) {
          if (g.totalToPar > worstScore) worstScore = g.totalToPar;
        }
      });
      if (worstScore === -999) worstScore = 0;

      // STEP 3: Build final golfer map, applying cut penalty after worstScore is known
      const golferMap = {};
      Object.values(rawMap).forEach(g => {
        golferMap[g.name] = {
          name: g.name,
          totalToPar: (!g.madeCut || g.withdrawn) ? worstScore + 1 : g.totalToPar,
          madeCut: g.madeCut,
          withdrawn: g.withdrawn,
        };
      });

      cachedGolfers = golferMap;
      return golferMap;

    } catch (e) {
      console.warn("ESPN fetch failed:", e);
      return cachedGolfers;
    }
  }

  // -- Google Sheet fetch -----------------------------------------------------

  async function fetchEntries() {
    if (!CONFIG.sheetCsvUrl) return [];
    try {
      const res = await fetch(CONFIG.sheetCsvUrl);
      const text = await res.text();
      const rows = parseCSV(text);

      return rows.map((row, i) => {
        const paid = (row["Paid"] ?? "").toUpperCase() === "TRUE";
        const name = row["Your Name"] ?? "Entry " + (i + 1);
        const timestamp = row["Timestamp"] ?? "";
        const tiebreaker = parseInt(row["Tiebreaker: Winning Score"] ?? "0") || 0;
        const picks = [
          row["Tier 1 -- The Favorites"] ?? "",
          row["Tier 2 -- The Contenders"] ?? "",
          row["Tier 3 -- The Dark Horses"] ?? "",
          row["Tier 4 -- The Long Shots"] ?? "",
          row["Tier 5 -- The Underdogs"] ?? "",
          row["Tier 6 -- The Field"] ?? "",
        ].map(normalizeName);

        return { name, paid, picks, timestamp, tiebreaker };
      });
    } catch (e) {
      console.warn("Sheet fetch failed:", e);
      return [];
    }
  }

  // -- Scoring engine ---------------------------------------------------------

  function scoreEntry(picks, golferMap) {
    const scores = picks.map(p => {
      const g = golferMap[p];
      if (!g) return { name: p, totalToPar: null, notStarted: true, madeCut: true, withdrawn: false };
      return { ...g, notStarted: g.totalToPar === null };
    });

    const active = scores.filter(s => s.totalToPar !== null);
    const notStarted = scores.filter(s => s.totalToPar === null);
    active.sort((a, b) => a.totalToPar - b.totalToPar);

    const counting = active.slice(0, 4);
    const countingNames = new Set(counting.map(s => s.name));
    const total = counting.reduce((sum, s) => sum + s.totalToPar, 0);
    const hasScore = counting.length > 0;

    return {
      total: hasScore ? total : null,
      scores: [...active, ...notStarted],
      countingNames,
    };
  }

  // -- Render -----------------------------------------------------------------

  function renderLeaderboard(entries, golferMap) {
    const container = document.getElementById("leaderboard-container");

    if (!entries.length) {
      container.innerHTML = '<div class="state-msg">No paid entries yet.</div>';
      return;
    }

    const scored = entries.map(e => {
      const result = golferMap
        ? scoreEntry(e.picks, golferMap)
        : { total: null, scores: e.picks.map(p => ({ name: p, totalToPar: null, notStarted: true, madeCut: true, withdrawn: false })), countingNames: new Set() };
      return { ...e, ...result };
    });

    scored.sort((a, b) => {
      const aNull = a.total === null, bNull = b.total === null;
      if (aNull && bNull) return a.timestamp < b.timestamp ? -1 : 1;
      if (aNull) return 1;
      if (bNull) return -1;
      if (a.total !== b.total) return a.total - b.total;
      if (CONFIG.actualWinningScore) {
        const aDiff = Math.abs(a.tiebreaker - CONFIG.actualWinningScore);
        const bDiff = Math.abs(b.tiebreaker - CONFIG.actualWinningScore);
        if (aDiff !== bDiff) return aDiff - bDiff;
      }
      return a.timestamp < b.timestamp ? -1 : 1;
    });

    let html = `
      <table>
        <thead>
          <tr>
            <th class="num">POS</th>
            <th>PLAYER</th>
            <th class="num">SCORE</th>
          </tr>
        </thead>
        <tbody>
    `;

    let pos = 1;
    scored.forEach((e, idx) => {
      const scoreObj = formatScore(e.total);
      const rowClass = e.paid ? "" : "unpaid";

      if (idx > 0 && scored[idx - 1].total === e.total && e.total !== null) {
        // tied -- hold position
      } else {
        pos = idx + 1;
      }
      const posDisplay = e.total === null ? "--" : pos;

      const chips = e.scores.map(s => {
        const isCounting = e.countingNames.has(s.name);
        const sc = formatScore(s.totalToPar);
        let chipClass = "golfer-chip";
        if (!s.madeCut || s.withdrawn) chipClass += " cut";
        else if (s.notStarted) chipClass += " not-started";
        else if (isCounting) chipClass += " counting";

        const scoreTag = s.notStarted
          ? `<span class="chip-score dash">--</span>`
          : `<span class="chip-score ${sc.cls}">${sc.display}</span>`;

        return `<span class="${chipClass}">${s.name}${scoreTag}</span>`;
      }).join("");

      html += `
        <tr class="${rowClass}">
          <td class="pos">${posDisplay}</td>
          <td>
            <div class="entry-name">${e.name}</div>
            <div class="golfer-list">${chips}</div>
          </td>
          <td class="total ${scoreObj.cls}">${e.total === null ? "--" : scoreObj.display}</td>
        </tr>
      `;
    });

    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  // -- Poll loop --------------------------------------------------------------

  async function refresh() {
    const [golferMap, entries] = await Promise.all([fetchESPN(), fetchEntries()]);
    const paid = entries.filter(e => e.paid);
    renderLeaderboard(paid, golferMap);

    const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const bar = document.getElementById("status-bar");
    bar.innerHTML = `<span class="live">LIVE</span> Last updated: ${now} &nbsp;|&nbsp; Refreshes every ${CONFIG.pollIntervalMinutes} min`;
  }

  async function start() {
    await refresh();
    setInterval(() => {
      if (!document.hidden) refresh();
    }, CONFIG.pollIntervalMinutes * 60 * 1000);
  }

  start();
  </script>

</body>
</html>
